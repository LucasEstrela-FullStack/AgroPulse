name: Frontend Preview

on:
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  docker-preview:
    name: Docker preview build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f Devops/Dockerfile -t agropulse-frontend:preview .

      - name: Inspect image
        run: docker image inspect agropulse-frontend:preview
